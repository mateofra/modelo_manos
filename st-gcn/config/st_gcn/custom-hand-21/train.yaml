work_dir: ./work_dir/recognition/custom-hand-21/ST_GCN

# feeder
feeder: feeder.feeder.Feeder
train_feeder_args:
  data_path: ./data/custom-hand-21/train_data.npy
  label_path: ./data/custom-hand-21/train_label.pkl
test_feeder_args:
  data_path: ./data/custom-hand-21/val_data.npy
  label_path: ./data/custom-hand-21/val_label.pkl

# model
model: net.st_gcn.Model
model_args:
  in_channels: 3
  num_class: 1
  dropout: 0.5
  edge_importance_weighting: True
  graph_args:
    layout: 'mediapipe_hand'
    strategy: 'spatial'

# optim
optimizer: Adam
base_lr: 0.001
weight_decay: 0.0001
step: []

# runtime
phase: train
use_gpu: False
num_worker: 0
batch_size: 1
test_batch_size: 1
num_epoch: 20
save_interval: 5
eval_interval: 1
